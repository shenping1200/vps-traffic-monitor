<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VPS 流量监控</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    :root{--bg:#07111f;--panel:rgba(15,27,48,.78);--line:rgba(148,163,184,.16);--text:#e5eefb;--muted:#8ea3bd;--blue:#38bdf8;--green:#34d399;--yellow:#fbbf24;--red:#fb7185;--shadow:0 24px 80px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at 16% 10%,rgba(56,189,248,.22),transparent 28%),radial-gradient(circle at 82% 0%,rgba(52,211,153,.16),transparent 24%),linear-gradient(135deg,#050b14 0%,var(--bg) 52%,#091827 100%)}
    .app{max-width:1280px;margin:0 auto;padding:28px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:24px}.brand{display:flex;align-items:center;gap:14px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--blue),var(--green));display:grid;place-items:center;box-shadow:0 12px 35px rgba(56,189,248,.24)}.logo svg{width:27px;height:27px;color:#03101d}h1{margin:0;font-size:24px;letter-spacing:-.02em}.subtitle{margin-top:4px;color:var(--muted);font-size:13px}.actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.pill,.select,.month{border:1px solid var(--line);background:rgba(15,23,42,.62);color:var(--text);border-radius:999px;padding:10px 14px;font-size:13px;backdrop-filter:blur(10px)}.select,.month{border-radius:14px;outline:none}.live{display:inline-flex;align-items:center;gap:8px}.dot{width:8px;height:8px;border-radius:999px;background:var(--green);box-shadow:0 0 0 6px rgba(52,211,153,.12)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(18px);position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent 42%);pointer-events:none}.metric{grid-column:span 3;min-height:150px}.chart-card{grid-column:span 8;min-height:430px}.side-card{grid-column:span 4;min-height:430px}.table-card{grid-column:span 12}.label{color:var(--muted);font-size:13px;display:flex;justify-content:space-between;align-items:center}.value{margin-top:16px;font-size:34px;font-weight:760;letter-spacing:-.04em}.unit{font-size:16px;color:var(--muted);margin-left:5px;font-weight:520}.trend{margin-top:14px;font-size:13px;display:inline-flex;align-items:center;gap:7px;padding:7px 10px;border-radius:999px;background:rgba(56,189,248,.1);color:#b9ecff}.trend.green{background:rgba(52,211,153,.1);color:#bbf7d0}.trend.yellow{background:rgba(251,191,36,.1);color:#fde68a}.trend.red{background:rgba(251,113,133,.1);color:#fecdd3}.card-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}.card-title h2{margin:0;font-size:16px;letter-spacing:-.01em}.tabs{display:flex;gap:8px}.tab{border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:7px 10px;font-size:12px}.tab.active{color:#03101d;background:var(--blue);border-color:transparent;font-weight:700}#speedChart{width:100%;height:340px}#trafficDonut{width:100%;height:230px}.status-list{display:grid;gap:12px;margin-top:8px}.status-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:1px solid var(--line);border-radius:16px;background:rgba(2,6,23,.22)}.status-item span:first-child{color:var(--muted);font-size:13px}.status-item strong{font-size:14px}.bar{height:8px;background:rgba(148,163,184,.16);border-radius:999px;overflow:hidden;margin-top:16px}.bar>i{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--blue),var(--green))}table{width:100%;border-collapse:collapse;position:relative;z-index:1}th,td{padding:15px 10px;text-align:left;border-bottom:1px solid var(--line);font-size:14px}th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.08em}td:last-child,th:last-child{text-align:right}.iface{display:flex;align-items:center;gap:10px;font-weight:700}.chip{font-size:12px;padding:5px 8px;border-radius:999px;background:rgba(52,211,153,.1);color:#86efac}.muted{color:var(--muted)}button{cursor:pointer}.logout{border:1px solid var(--line);background:rgba(251,113,133,.12);color:#fecdd3;border-radius:999px;padding:10px 14px}.login-mask{position:fixed;inset:0;display:grid;place-items:center;background:rgba(2,6,23,.78);backdrop-filter:blur(18px);z-index:10}.login-card{width:min(420px,calc(100vw - 36px));background:rgba(15,27,48,.95);border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:var(--shadow)}.login-card h2{margin:0 0 8px}.login-card p{margin:0 0 22px;color:var(--muted)}.field{display:grid;gap:8px;margin-bottom:14px}.field label{font-size:13px;color:var(--muted)}.field input{width:100%;border:1px solid var(--line);background:#081423;color:var(--text);border-radius:14px;padding:13px 14px;outline:none}.login-card button{width:100%;border:0;border-radius:14px;padding:13px 14px;background:linear-gradient(135deg,var(--blue),var(--green));color:#03101d;font-weight:800}.error{min-height:20px;color:#fecdd3;font-size:13px;margin:8px 0 0}.hidden{display:none!important}@media(max-width:980px){.metric{grid-column:span 6}.chart-card,.side-card{grid-column:span 12}.topbar{align-items:flex-start;flex-direction:column}}@media(max-width:620px){.app{padding:18px}.metric{grid-column:span 12}.value{font-size:30px}table{min-width:760px}.table-scroll{overflow:auto}}
  </style>
</head>
<body>
  <div class="login-mask" id="loginMask">
    <form class="login-card" id="loginForm">
      <h2>登录流量监控</h2>
      <p>默认账号 admin，端口 9090。</p>
      <div class="field"><label>账号</label><input id="username" autocomplete="username" value="admin" /></div>
      <div class="field"><label>密码</label><input id="password" type="password" autocomplete="current-password" /></div>
      <button type="submit">登录</button>
      <div class="error" id="loginError"></div>
    </form>
  </div>
  <main class="app">
    <section class="topbar">
      <div class="brand"><div class="logo"><svg viewBox="0 0 24 24" fill="none"><path d="M4 15.5h4.4l2.2-7 3.8 11 2.4-7H20" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><h1>VPS 流量监控</h1><div class="subtitle" id="subtitle">0.0.0.0:9090 · 自动刷新 1 秒</div></div></div>
      <div class="actions"><div class="pill live"><i class="dot"></i>服务在线</div><select class="select" id="ifaceSelect"><option value="all">全部网卡</option></select><input class="month" type="month" id="monthPicker" /><div class="pill" id="userPill">登录用户：admin</div><button class="logout" id="logoutBtn">退出</button></div>
    </section>
    <section class="grid">
      <article class="card metric"><div class="label">实时下载 <span>↓ RX</span></div><div class="value" id="rxRate">0<span class="unit">B/s</span></div><div class="trend green">当前选择网卡</div></article>
      <article class="card metric"><div class="label">实时上传 <span>↑ TX</span></div><div class="value" id="txRate">0<span class="unit">B/s</span></div><div class="trend">每秒自动刷新</div></article>
      <article class="card metric"><div class="label">当月下载 <span id="monthRxLabel">累计</span></div><div class="value" id="monthRx">0<span class="unit">B</span></div><div class="trend yellow">可选择月份查询</div></article>
      <article class="card metric"><div class="label">当月上传 <span id="monthTxLabel">累计</span></div><div class="value" id="monthTx">0<span class="unit">B</span></div><div class="trend red">实时写入 SQLite</div></article>
      <article class="card chart-card"><div class="card-title"><h2>实时速率趋势</h2><div class="tabs"><span class="tab active">最近 60 秒</span></div></div><div id="speedChart"></div></article>
      <article class="card side-card"><div class="card-title"><h2>月份累计概览</h2><span class="muted" id="selectedMonthText">本月</span></div><div id="trafficDonut"></div><div class="status-list"><div class="status-item"><span>选中月份下载</span><strong id="sideRx">0 B</strong></div><div class="status-item"><span>选中月份上传</span><strong id="sideTx">0 B</strong></div><div class="status-item"><span>当前网卡</span><strong id="sideIface">全部网卡</strong></div></div><div class="bar"><i id="ratioBar"></i></div></article>
      <article class="card table-card"><div class="card-title"><h2>网卡明细</h2><span class="muted">实时速率 + 选中月份累计</span></div><div class="table-scroll"><table><thead><tr><th>网卡</th><th>下载速度</th><th>上传速度</th><th>月份下载</th><th>月份上传</th><th>状态</th></tr></thead><tbody id="ifaceRows"></tbody></table></div></article>
    </section>
  </main>
  <script>
    const state={history:Array.from({length:60},()=>({rx:0,tx:0})),interfaces:[],monthly:null,user:'admin'};
    const elements={loginMask:document.getElementById('loginMask'),loginForm:document.getElementById('loginForm'),loginError:document.getElementById('loginError'),username:document.getElementById('username'),password:document.getElementById('password'),subtitle:document.getElementById('subtitle'),ifaceSelect:document.getElementById('ifaceSelect'),monthPicker:document.getElementById('monthPicker'),rxRate:document.getElementById('rxRate'),txRate:document.getElementById('txRate'),monthRx:document.getElementById('monthRx'),monthTx:document.getElementById('monthTx'),monthRxLabel:document.getElementById('monthRxLabel'),monthTxLabel:document.getElementById('monthTxLabel'),selectedMonthText:document.getElementById('selectedMonthText'),sideRx:document.getElementById('sideRx'),sideTx:document.getElementById('sideTx'),sideIface:document.getElementById('sideIface'),ratioBar:document.getElementById('ratioBar'),ifaceRows:document.getElementById('ifaceRows'),logoutBtn:document.getElementById('logoutBtn'),userPill:document.getElementById('userPill')};
    const formatBytes=(bytes,suffix='B')=>{const units=['B','KB','MB','GB','TB','PB'];let value=Number(bytes)||0,index=0;while(value>=1024&&index<units.length-1){value/=1024;index++}return `${value>=10||index===0?value.toFixed(0):value.toFixed(2)} ${units[index]}${suffix==='B'?'':'/'+suffix}`};
    const setValue=(el,text)=>{const [value,unit]=text.split(' ');el.innerHTML=`${value}<span class="unit">${unit||''}</span>`};
    async function api(path,options={}){const res=await fetch(path,{credentials:'include',...options});if(res.status===401){elements.loginMask.classList.remove('hidden');throw new Error('unauthorized')}if(!res.ok)throw new Error(await res.text());return res.json()}
    const chart=echarts.init(document.getElementById('speedChart'));const donut=echarts.init(document.getElementById('trafficDonut'));
    function renderChart(){const labels=state.history.map((_,i)=>`${59-i}s`).reverse();chart.setOption({grid:{left:42,right:18,top:22,bottom:36},tooltip:{trigger:'axis',backgroundColor:'#0f172a',borderColor:'rgba(148,163,184,.2)',textStyle:{color:'#e5eefb'}},legend:{top:0,right:0,textStyle:{color:'#8ea3bd'},data:['下载','上传']},xAxis:{type:'category',data:labels,axisLine:{lineStyle:{color:'rgba(148,163,184,.18)'}},axisLabel:{color:'#8ea3bd',interval:9}},yAxis:{type:'value',axisLabel:{color:'#8ea3bd',formatter:v=>formatBytes(v,'s')},splitLine:{lineStyle:{color:'rgba(148,163,184,.1)'}}},series:[{name:'下载',type:'line',smooth:true,data:state.history.map(i=>i.rx),showSymbol:false,lineStyle:{width:3,color:'#38bdf8'},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(56,189,248,.34)'},{offset:1,color:'rgba(56,189,248,0)'}])}},{name:'上传',type:'line',smooth:true,data:state.history.map(i=>i.tx),showSymbol:false,lineStyle:{width:3,color:'#34d399'},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(52,211,153,.25)'},{offset:1,color:'rgba(52,211,153,0)'}])}}]})}
    function renderDonut(rx,tx){const total=rx+tx;elements.ratioBar.style.width=total?`${Math.min(100,rx/total*100)}%`:'0%';donut.setOption({tooltip:{trigger:'item'},series:[{type:'pie',radius:['66%','86%'],label:{color:'#e5eefb',formatter:'{b}\n{d}%'},labelLine:{lineStyle:{color:'rgba(148,163,184,.4)'}},data:[{value:rx,name:'下载',itemStyle:{color:'#38bdf8'}},{value:tx,name:'上传',itemStyle:{color:'#34d399'}}]}],graphic:[{type:'text',left:'center',top:'43%',style:{text:formatBytes(total).replace(' ',''),fill:'#e5eefb',fontSize:24,fontWeight:800}},{type:'text',left:'center',top:'58%',style:{text:'月份总量',fill:'#8ea3bd',fontSize:13}}]})}
    function selectedIfaceData(){const iface=elements.ifaceSelect.value;if(iface==='all')return {rxRate:state.interfaces.reduce((s,i)=>s+i.rxRate,0),txRate:state.interfaces.reduce((s,i)=>s+i.txRate,0),name:'全部网卡'};const item=state.interfaces.find(i=>i.iface===iface)||{rxRate:0,txRate:0};return {...item,name:iface}}
    function selectedMonthlyData(){const iface=elements.ifaceSelect.value;if(!state.monthly)return {rx:0,tx:0};if(iface==='all')return {rx:state.monthly.totalRx,tx:state.monthly.totalTx};const item=state.monthly.interfaces.find(i=>i.iface===iface)||{rx:0,tx:0};return {rx:item.rx,tx:item.tx}}
    function render(){const live=selectedIfaceData();const monthly=selectedMonthlyData();setValue(elements.rxRate,formatBytes(live.rxRate,'s'));setValue(elements.txRate,formatBytes(live.txRate,'s'));setValue(elements.monthRx,formatBytes(monthly.rx));setValue(elements.monthTx,formatBytes(monthly.tx));elements.monthRxLabel.textContent=elements.monthPicker.value;elements.monthTxLabel.textContent=elements.monthPicker.value;elements.sideRx.textContent=formatBytes(monthly.rx);elements.sideTx.textContent=formatBytes(monthly.tx);elements.sideIface.textContent=live.name;elements.selectedMonthText.textContent=elements.monthPicker.value;renderDonut(monthly.rx,monthly.tx);const monthlyByIface=new Map((state.monthly?.interfaces||[]).map(i=>[i.iface,i]));elements.ifaceRows.innerHTML=state.interfaces.map(i=>{const usage=monthlyByIface.get(i.iface)||{rx:0,tx:0};return `<tr><td><div class="iface">${i.iface}</div></td><td>${formatBytes(i.rxRate,'s')}</td><td>${formatBytes(i.txRate,'s')}</td><td>${formatBytes(usage.rx)}</td><td>${formatBytes(usage.tx)}</td><td><span class="chip">在线</span></td></tr>`}).join('')}
    async function loadMonthly(){state.monthly=await api(`/api/monthly?month=${encodeURIComponent(elements.monthPicker.value)}`);render()}
    async function tick(){try{const data=await api('/api/realtime');state.interfaces=data.interfaces;const selected=selectedIfaceData();state.history.push({rx:selected.rxRate,tx:selected.txRate});state.history=state.history.slice(-60);if(!elements.monthPicker.value)elements.monthPicker.value=data.month;if(elements.monthPicker.value===data.month)state.monthly=data.currentMonthUsage;updateIfaceOptions();elements.subtitle.textContent=`${location.hostname||'0.0.0.0'}:9090 · 自动刷新 1 秒 · ${new Date().toLocaleTimeString()}`;renderChart();render()}catch(error){if(error.message!=='unauthorized')console.error(error)}}
    function updateIfaceOptions(){const current=elements.ifaceSelect.value;const options=['<option value="all">全部网卡</option>',...state.interfaces.map(i=>`<option value="${i.iface}">${i.iface}</option>`)];elements.ifaceSelect.innerHTML=options.join('');elements.ifaceSelect.value=[...state.interfaces.map(i=>i.iface),'all'].includes(current)?current:'all'}
    elements.loginForm.addEventListener('submit',async event=>{event.preventDefault();elements.loginError.textContent='';try{await api('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:elements.username.value,password:elements.password.value})});elements.loginMask.classList.add('hidden');elements.userPill.textContent=`登录用户：${elements.username.value}`;await tick()}catch(error){elements.loginError.textContent='账号或密码错误'}});
    elements.logoutBtn.addEventListener('click',async()=>{await api('/api/logout',{method:'POST'}).catch(()=>{});elements.loginMask.classList.remove('hidden')});elements.ifaceSelect.addEventListener('change',()=>{const selected=selectedIfaceData();state.history.push({rx:selected.rxRate,tx:selected.txRate});renderChart();render()});elements.monthPicker.addEventListener('change',loadMonthly);window.addEventListener('resize',()=>{chart.resize();donut.resize()});
    (async()=>{const now=new Date();elements.monthPicker.value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;renderChart();renderDonut(0,0);try{const me=await api('/api/me');elements.loginMask.classList.add('hidden');elements.userPill.textContent=`登录用户：${me.username}`;await tick();setInterval(tick,1000)}catch(error){setInterval(tick,1000)}})();
  </script>
</body>
</html>
